<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Creamora Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:radial-gradient(circle at top,#14121a,#0b0a10);
color:#e6d3b3;
font-family:Montserrat;
}

/* HEADER */
h1{
text-align:center;
font-family:Cinzel;
color:#c8a24a;
margin:20px 0;
letter-spacing:2px;
}

/* CART CONTAINER */
#box{
max-width:900px;
margin:auto;
padding:10px;
}

/* ITEM */
.item{
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(8px);
border:1px solid rgba(200,162,74,0.2);
padding:15px;
margin-bottom:12px;
border-radius:14px;
transition:0.3s;
}

.item:hover{
transform:scale(1.02);
border-color:#c8a24a;
}

.item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

.details{
flex:1;
margin-left:15px;
}

.details h3{
margin:0;
font-family:Cinzel;
color:#f5d27a;
font-size:14px;
}

.details p{
margin:5px 0 0;
opacity:0.8;
}

/* QTY */
.qty{
display:flex;
align-items:center;
gap:8px;
}

.qty button{
background:#c8a24a;
border:none;
padding:6px 10px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

.qty span{
min-width:20px;
text-align:center;
}

/* REMOVE */
.remove{
background:#ff3b3b !important;
color:white;
}

/* EMPTY */
.empty{
text-align:center;
margin-top:80px;
opacity:0.6;
font-size:18px;
}

.empty::before{
content:"🛒";
font-size:50px;
display:block;
margin-bottom:10px;
}

/* TOTAL BAR */
.total{
position:sticky;
bottom:0;
background:rgba(11,10,16,0.95);
backdrop-filter:blur(10px);
border-top:1px solid #333;
padding:18px;
text-align:right;
font-size:20px;
font-family:Cinzel;
color:#f5d27a;
}

/* CHECKOUT BAR */
.checkout-bar{
position:sticky;
bottom:60px;
text-align:center;
padding:10px;
}

.checkout-bar button{
background:linear-gradient(90deg,#c8a24a,#f5d27a);
border:none;
padding:14px 25px;
border-radius:12px;
font-family:Cinzel;
cursor:pointer;
transition:0.3s;
}

.checkout-bar button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<h1>Your Sweet Cart 🍰</h1>

<div id="box"></div>

<div class="checkout-bar">
<button onclick="goCheckout()">Proceed to Checkout</button>
</div>

<div class="total" id="total"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(){

let box=document.getElementById("box");
box.innerHTML="";

let total=0;

if(cart.length===0){
box.innerHTML=`<div class="empty">Your cart is empty<br>Start adding your favorite cakes 💛</div>`;
document.querySelector(".checkout-bar").style.display="none";
document.getElementById("total").innerText="";
return;
}

document.querySelector(".checkout-bar").style.display="block";

cart.forEach((c,i)=>{

total += c.price * c.qty;

box.innerHTML += `
<div class="item">

<img src="${c.img}">

<div class="details">
<h3>${c.name}</h3>
<p>₹${c.price}</p>
</div>

<div class="qty">
<button onclick="minus(${i})">-</button>
<span>${c.qty}</span>
<button onclick="plus(${i})">+</button>
<button class="remove" onclick="removeItem(${i})">X</button>
</div>

</div>
`;
});

document.getElementById("total").innerText="Total: ₹"+total;

}

function plus(i){
cart[i].qty++;
save();
}

function minus(i){
if(cart[i].qty>1){
cart[i].qty--;
}else{
cart.splice(i,1);
}
save();
}

function removeItem(i){
cart.splice(i,1);
save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

function goCheckout(){
window.location.href="checkout.html";
}

render();

</script>

</body>
</html>
