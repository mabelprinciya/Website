<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creamora</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background: radial-gradient(circle at top, #0b0a10, #07060c);
font-family:'Montserrat', sans-serif;
color:#d6c7a1;
overflow:hidden;
}

/* PREMIUM GOLD LIGHTS */
.glow1,.glow2,.glow3{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:0.2;
z-index:-1;
}

.glow1{
width:500px;height:500px;
background:#c8a24a;
top:-120px;left:-120px;
}

.glow2{
width:600px;height:600px;
background:#8a6a1f;
bottom:-200px;right:-200px;
}

.glow3{
width:400px;height:400px;
background:#f5d27a;
top:40%;left:40%;
opacity:0.08;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 70px;
}

.logo{
font-family:'Cinzel', serif;
font-size:32px;
letter-spacing:5px;
color:#c8a24a;
text-shadow:0 0 20px rgba(200,162,74,0.25);
}

nav a{
margin:0 18px;
text-decoration:none;
color:#d6c7a1;
font-size:13px;
letter-spacing:1px;
transition:0.3s;
}

nav a:hover{
color:#f5d27a;
}

/* HERO */
.hero{
display:flex;
justify-content:center;
align-items:center;
height:75vh;
text-align:center;
}

.hero-box{
max-width:750px;
animation:fade 1.2s ease;
}

.hero h1{
font-size:70px;
font-family:'Cinzel', serif;
margin:0;
line-height:1.1;
color:#c8a24a;
letter-spacing:2px;
}

.hero span{
color:#f5d27a;
}

.hero p{
margin-top:20px;
font-size:15px;
opacity:0.85;
line-height:1.7;
}

/* GOLD BUTTON */
button{
margin-top:30px;
padding:14px 34px;
border:none;
background:linear-gradient(90deg,#8a6a1f,#f5d27a,#c8a24a);
color:#07060c;
font-weight:600;
border-radius:8px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 30px rgba(200,162,74,0.15);
}

button:hover{
transform:scale(1.07);
box-shadow:0 0 40px rgba(200,162,74,0.3);
}

/* FLOATING PREMIUM LINE EFFECT */
.line{
width:200px;
height:2px;
background:linear-gradient(90deg,transparent,#c8a24a,transparent);
margin:25px auto;
animation:move 2.5s infinite;
}

@keyframes move{
0%{transform:scaleX(0.4);opacity:0.4}
50%{transform:scaleX(1);opacity:1}
100%{transform:scaleX(0.4);opacity:0.4}
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

</style>

</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>
<div class="glow3"></div>

<nav>
<div class="logo">Creamora</div>

<div>
<a href="home.html">HOME</a>
<a href="shop.html">SHOP</a>
<a href="features.html">FEATURES</a>
</div>
</nav>

<section class="hero">

<div class="hero-box">

<h1>
Luxury Cakes <br>
For Every <span>Moment</span>
</h1>

<div class="line"></div>

<p>
A premium dessert experience crafted with elegance, emotion and golden perfection.
No images needed — only pure luxury design language.
</p>

<a href="shop.html">
<button>Browse Cakes</button>
</a>

</div>

</section>

</body>
</html>
