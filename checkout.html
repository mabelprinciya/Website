<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Creamora Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:radial-gradient(circle at top,#14121a,#0b0a10);
font-family:Montserrat;
color:#e6cfa3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.card{
width:90%;
max-width:450px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(200,162,74,0.2);
border-radius:18px;
padding:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
animation:fadeIn 0.6s ease;
}

/* TITLE */
h1{
text-align:center;
font-family:Cinzel;
color:#c8a24a;
margin-bottom:20px;
}

/* INPUTS */
input,textarea{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:none;
outline:none;
background:rgba(255,255,255,0.06);
color:#fff;
font-size:14px;
}

textarea{
resize:none;
height:80px;
}

/* BUTTON (BOTTOM STYLE) */
button{
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(90deg,#c8a24a,#f5d27a);
border:none;
border-radius:12px;
cursor:pointer;
font-family:Cinzel;
font-weight:600;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* POPUP */
.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#c8a24a;
color:#0b0a10;
padding:12px 18px;
border-radius:10px;
display:none;
font-weight:500;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="card">

<h1>Checkout Details</h1>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Delivery Address"></textarea>

<button onclick="goPayment()">Continue to Payment</button>

</div>

<div class="popup" id="popup"></div>

<script>

function showPopup(msg){
let p=document.getElementById("popup");
p.innerText=msg;
p.style.display="block";

setTimeout(()=>{
p.style.display="none";
},2000);
}

function goPayment(){

let data={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value
};

if(!data.name || !data.phone || !data.address){
showPopup("⚠ Please fill all details");
return;
}

localStorage.setItem("customer",JSON.stringify(data));

showPopup("Redirecting to payment... 💳");

setTimeout(()=>{
window.location.href="payment.html";
},1200);

}

</script>

</body>
</html>
